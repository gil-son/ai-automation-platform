version: '3.8'

services:

  db:
    image: pgvector/pgvector:pg16
    container_name: pgvector-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - "5001:8080"
    depends_on:
      - db

  langfuse-db:
    image: postgres:15
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:latest
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - langfuse-db
    environment:
      - NEXT_PUBLIC_LANGFUSE_HOST=http://localhost:3000
      - LANGFUSE_SECRET_KEY=super-secret-secret-key
      - LANGFUSE_PUBLIC_KEY=public-key
      - DATABASE_URL=postgresql://postgres:password@langfuse-db:5432/langfuse

volumes:
  pgdata:
  langfuse-pgdata: